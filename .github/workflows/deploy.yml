name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ""
          oauth-secret: ""
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via Portainer API
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_TOKEN: ${{ secrets.PORTAINER_API_TOKEN }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GROUP_NAME: ${{ secrets.GROUP_NAME }}
          TRAINER_PHONE: ${{ secrets.TRAINER_PHONE }}
          POLL_CRON: ${{ secrets.POLL_CRON }}
          TRAINING_DAY: ${{ secrets.TRAINING_DAY }}
          TRAINING_TIME: ${{ secrets.TRAINING_TIME }}
          SUMMARY_HOURS_BEFORE: ${{ secrets.SUMMARY_HOURS_BEFORE }}
        run: |
          STACK_INFO=$(curl -s -H "X-API-Key: $PORTAINER_API_TOKEN" \
            "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID")
          ENDPOINT_ID=$(echo "$STACK_INFO" | jq -r '.EndpointId')
          CURRENT_ENV=$(echo "$STACK_INFO" | jq '.Env // []')
          echo "Endpoint ID: $ENDPOINT_ID"

          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "Pulling latest image..."
          curl -s -X POST \
            -H "X-API-Key: $PORTAINER_API_TOKEN" \
            "$PORTAINER_URL/api/endpoints/$ENDPOINT_ID/docker/images/create?fromImage=ghcr.io%2F${REPO_LC}&tag=latest"
          echo "Image pulled."

          MERGED_ENV=$(echo "$CURRENT_ENV" | jq \
            --arg v1 "$GOOGLE_SHEET_ID" \
            --arg v2 "$GOOGLE_SERVICE_ACCOUNT_EMAIL" \
            --arg v3 "$GOOGLE_PRIVATE_KEY" \
            --arg v4 "$GROUP_NAME" \
            --arg v5 "$TRAINER_PHONE" \
            --arg v6 "$POLL_CRON" \
            --arg v7 "$TRAINING_DAY" \
            --arg v8 "$TRAINING_TIME" \
            --arg v9 "$SUMMARY_HOURS_BEFORE" \
            '[ if $v1 != "" then {"name":"GOOGLE_SHEET_ID","value":$v1} else empty end,
               if $v2 != "" then {"name":"GOOGLE_SERVICE_ACCOUNT_EMAIL","value":$v2} else empty end,
               if $v3 != "" then {"name":"GOOGLE_PRIVATE_KEY","value":$v3} else empty end,
               if $v4 != "" then {"name":"GROUP_NAME","value":$v4} else empty end,
               if $v5 != "" then {"name":"TRAINER_PHONE","value":$v5} else empty end,
               if $v6 != "" then {"name":"POLL_CRON","value":$v6} else empty end,
               if $v7 != "" then {"name":"TRAINING_DAY","value":$v7} else empty end,
               if $v8 != "" then {"name":"TRAINING_TIME","value":$v8} else empty end,
               if $v9 != "" then {"name":"SUMMARY_HOURS_BEFORE","value":$v9} else empty end
            ] as $new | ($new | map(.name)) as $new_names |
            [.[] | select(.name as $n | $new_names | index($n) | not)] + $new')

          STACK_FILE=$(cat docker-compose.yml)
          echo "Redeploying stack with $(echo "$MERGED_ENV" | jq length) env vars..."
          curl -s -X PUT \
            -H "X-API-Key: $PORTAINER_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"StackFileContent\": $(echo "$STACK_FILE" | jq -Rs .),
              \"Env\": $MERGED_ENV,
              \"Prune\": true
            }" \
            "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID?endpointId=$ENDPOINT_ID"
          echo "Deploy complete."
